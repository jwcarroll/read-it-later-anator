# Amplify Hosting build specification for this repository.
# Publishes the static frontend artifact from ./frontend.
version: 1
applications:
  - appRoot: .
    frontend:
      phases:
        preBuild:
          commands:
            - npm ci
        build:
          commands:
            - npm run web:build
      artifacts:
        baseDirectory: frontend
        files:
          - '**/*'
      cache:
        paths:
          - node_modules/**/*
